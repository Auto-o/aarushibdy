<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Aarushi!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;700&display=swap">
</head>
<body>
    <div id="landing">
        <div class="landing-content">
            <h1>🎉 Happy Birthday Aarushi! 🎉</h1>
            <p>Click to celebrate!</p>
            <button id="enter-btn">🎂 Enter 🎂</button>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <audio id="bg-music" loop>
            <source src="song.mp3" type="audio/mpeg">
        </audio>

        <div class="floating-elements" id="floating-elements"></div>

        <div class="container">
            <div class="raccoon">
                <svg viewBox="0 0 200 200" class="raccoon-svg">
                    <ellipse cx="100" cy="120" rx="50" ry="40" fill="#8B7355"/>
                    <ellipse cx="100" cy="130" rx="40" ry="30" fill="#A08060"/>
                    <ellipse cx="70" cy="85" rx="30" ry="25" fill="#8B7355"/>
                    <ellipse cx="130" cy="85" rx="30" ry="25" fill="#8B7355"/>
                    <ellipse cx="70" cy="85" rx="20" ry="18" fill="#A08060"/>
                    <ellipse cx="130" cy="85" rx="20" ry="18" fill="#A08060"/>
                    <circle cx="85" cy="80" r="12" fill="white"/>
                    <circle cx="115" cy="80" r="12" fill="white"/>
                    <circle cx="85" cy="80" r="6" fill="#333"/>
                    <circle cx="115" cy="80" r="6" fill="#333"/>
                    <circle cx="87" cy="78" r="2" fill="white"/>
                    <circle cx="117" cy="78" r="2" fill="white"/>
                    <ellipse cx="100" cy="95" rx="8" ry="5" fill="#333"/>
                    <path d="M 95 100 Q 100 105 105 100" stroke="#333" stroke-width="2" fill="none"/>
                    <path d="M 60 70 Q 50 50 40 55" stroke="#8B7355" stroke-width="8" fill="none" stroke-linecap="round"/>
                    <path d="M 140 70 Q 150 50 160 55" stroke="#8B7355" stroke-width="8" fill="none" stroke-linecap="round"/>
                    <ellipse cx="35" cy="50" rx="12" ry="15" fill="#8B7355"/>
                    <ellipse cx="165" cy="50" rx="12" ry="15" fill="#8B7355"/>
                    <ellipse cx="35" cy="50" rx="6" ry="8" fill="#A08060"/>
                    <ellipse cx="165" cy="50" rx="6" ry="8" fill="#A08060"/>
                    <path d="M 30 140 Q 10 130 5 100" stroke="#8B7355" stroke-width="15" fill="none" stroke-linecap="round"/>
                    <path d="M 170 140 Q 190 130 195 100" stroke="#8B7355" stroke-width="15" fill="none" stroke-linecap="round"/>
                    <ellipse cx="10" cy="95" rx="12" ry="20" fill="#8B7355" stroke="#6B5344" stroke-width="2"/>
                    <ellipse cx="190" cy="95" rx="12" ry="20" fill="#8B7355" stroke="#6B5344" stroke-width="2"/>
                    <path d="M 5 85 L 15 95 M 5 95 L 15 85" stroke="#6B5344" stroke-width="2"/>
                    <path d="M 185 85 L 195 95 M 185 95 L 195 85" stroke="#6B5344" stroke-width="2"/>
                </svg>
            </div>

            <div class="cake-gif">
                <img src="https://media1.tenor.com/m/a8b2WMFdQCUAAAAd/birthday-cake.gif" alt="Birthday Cake">
            </div>

            <h1 class="title">Happy Birthday <span class="name">Aarushi!</span> 🎂</h1>

            <div class="countdown">
                <div class="countdown-item">
                    <span id="days">00</span>
                    <label>Days</label>
                </div>
                <div class="countdown-item">
                    <span id="hours">00</span>
                    <label>Hours</label>
                </div>
                <div class="countdown-item">
                    <span id="minutes">00</span>
                    <label>Minutes</label>
                </div>
                <div class="countdown-item">
                    <span id="seconds">00</span>
                    <label>Seconds</label>
                </div>
            </div>

            <p class="birthday-text">Wishing you a fantastic day! 💖</p>

            <div class="buttons">
                <a href="tama.html" class="btn Tama">Tama's Wish 💕</a>
                <a href="tuli.html" class="btn Tuli">Tuli's Wish 💖</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
