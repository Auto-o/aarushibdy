<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Aarushi!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <!-- Animated JS Background -->
    <canvas id="bg-canvas"></canvas>

    <!-- Landing Overlay -->
    <div id="landing">
        <div class="landing-content">
            <div class="cake-gif-landing">
                <!-- JS Pixel Cake Canvas -->
                <canvas id="cake-canvas" width="160" height="160"></canvas>
            </div>
            <h1 class="landing-title">Happy Birthday<br><span class="name">Aarushi</span> 🎂</h1>
            <p class="landing-subtitle">Click anywhere to celebrate!</p>
            <div class="click-pulse"></div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <audio id="bg-music" loop>
            <source src="song.mp3" type="audio/mpeg">
        </audio>

        <!-- Floating Decorations -->
        <div class="floating-decorations" id="floating-decorations"></div>
        
        <!-- Canvas for Confetti -->
        <canvas id="confetti-canvas"></canvas>

        <div class="container glass-panel">
            <!-- Header -->
            <header class="header">
            </header>

            <!-- Title -->
            <h1 class="main-title">
                <span class="title-text">Happy Birthday</span>
                <span class="name-highlight">Aarushi!</span>
            </h1>

            <!-- Subtitle -->
            <p class="subtitle">MEKA HAPPY BIRTHDAY LADLE 💫</p>

            <!-- Countdown -->
            <div class="countdown-section">
                <h2 class="countdown-label">🎉 Birthday Countdown 🎉</h2>
                <div class="countdown">
                    <div class="countdown-item">
                        <span class="countdown-number" id="days">00</span>
                        <span class="countdown-text">Days</span>
                    </div>
                    <div class="countdown-separator">:</div>
                    <div class="countdown-item">
                        <span class="countdown-number" id="hours">00</span>
                        <span class="countdown-text">Hours</span>
                    </div>
                    <div class="countdown-separator">:</div>
                    <div class="countdown-item">
                        <span class="countdown-number" id="minutes">00</span>
                        <span class="countdown-text">Minutes</span>
                    </div>
                    <div class="countdown-separator">:</div>
                    <div class="countdown-item">
                        <span class="countdown-number" id="seconds">00</span>
                        <span class="countdown-text">Seconds</span>
                    </div>
                </div>
            </div>

            <!-- Wish Buttons -->
            <div class="button-section">
                <p class="button-label">🎁 Send Your Wishes 🎁</p>
                <div class="button-container">
                    <a href="tama.html" class="wish-button Tama">
                        <span class="button-icon">💕</span>
                        <span class="button-text">Tama's Wish</span>
                        <span class="button-subtext">View Message →</span>
                    </a>
                    <a href="tuli.html" class="wish-button Tuli">
                        <span class="button-icon">💖</span>
                        <span class="button-text">Tuli's Wish</span>
                        <span class="button-subtext">View Message →</span>
                    </a>
                </div>
            </div>

            <!-- Footer -->
            <footer class="footer">
                <p>Made with 💖 for Aarushi</p>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
