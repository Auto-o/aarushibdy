<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Aarushi!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Landing Overlay -->
    <div id="landing">
        <div class="landing-content">
            <div class="cake-gif-landing">
                <img src="https://media1.tenor.com/m/a8b2WMFdQCUAAAAd/birthday-cake.gif" alt="Birthday Cake">
            </div>
            <h1 class="landing-title">Happy Birthday<br><span class="name">Aarushi</span> 🎂</h1>
            <p class="landing-subtitle">Click anywhere to celebrate!</p>
            <div class="click-pulse"></div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <audio id="bg-music" loop>
            <source src="song.mp3" type="audio/mpeg">
        </audio>

        <!-- Floating Decorations -->
        <div class="floating-decorations" id="floating-decorations"></div>

        <div class="container">
            <!-- Header with Raccoon -->
            <header class="header">
                <div class="raccoon-container">
                    <svg viewBox="0 0 200 200" class="raccoon-svg">
                        <defs>
                            <linearGradient id="raccoonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#9B8B7A"/>
                                <stop offset="100%" style="stop-color:#6B5B4A"/>
                            </linearGradient>
                        </defs>
                        <ellipse cx="100" cy="125" rx="55" ry="45" fill="url(#raccoonGrad)"/>
                        <ellipse cx="100" cy="135" rx="42" ry="32" fill="#8B7B6A"/>
                        <ellipse cx="70" cy="90" rx="32" ry="28" fill="url(#raccoonGrad)"/>
                        <ellipse cx="130" cy="90" rx="32" ry="28" fill="url(#raccoonGrad)"/>
                        <ellipse cx="70" cy="90" rx="22" ry="20" fill="#A08B7A"/>
                        <ellipse cx="130" cy="90" rx="22" ry="20" fill="#A08B7A"/>
                        <circle cx="85" cy="85" r="14" fill="white"/>
                        <circle cx="115" cy="85" r="14" fill="white"/>
                        <circle cx="85" cy="85" r="7" fill="#2D2D2D"/>
                        <circle cx="115" cy="85" r="7" fill="#2D2D2D"/>
                        <circle cx="87" cy="83" r="2.5" fill="white"/>
                        <circle cx="117" cy="83" r="2.5" fill="white"/>
                        <ellipse cx="100" cy="100" rx="10" ry="6" fill="#2D2D2D"/>
                        <path d="M 94 106 Q 100 112 106 106" stroke="#2D2D2D" stroke-width="2.5" fill="none"/>
                        <path d="M 58 72 Q 45 50 35 55" stroke="#8B7B6A" stroke-width="10" fill="none" stroke-linecap="round"/>
                        <path d="M 142 72 Q 155 50 165 55" stroke="#8B7B6A" stroke-width="10" fill="none" stroke-linecap="round"/>
                        <ellipse cx="32" cy="48" rx="14" ry="18" fill="url(#raccoonGrad)"/>
                        <ellipse cx="168" cy="48" rx="14" ry="18" fill="url(#raccoonGrad)"/>
                        <ellipse cx="32" cy="48" rx="7" ry="10" fill="#A08B7A"/>
                        <ellipse cx="168" cy="48" rx="7" ry="10" fill="#A08B7A"/>
                        <path d="M 25 145 Q 5 135 0 100" stroke="#8B7B6A" stroke-width="18" fill="none" stroke-linecap="round"/>
                        <path d="M 175 145 Q 195 135 200 100" stroke="#8B7B6A" stroke-width="18" fill="none" stroke-linecap="round"/>
                        <ellipse cx="5" cy="95" rx="14" ry="22" fill="#8B7B6A" stroke="#5B4B3A" stroke-width="2"/>
                        <ellipse cx="195" cy="95" rx="14" ry="22" fill="#8B7B6A" stroke="#5B4B3A" stroke-width="2"/>
                        <path d="M 0 82 L 10 95 M 0 95 L 10 82" stroke="#5B4B3A" stroke-width="2.5"/>
                        <path d="M 190 82 L 200 95 M 190 95 L 200 82" stroke="#5B4B3A" stroke-width="2.5"/>
                    </svg>
                </div>
            </header>

            <!-- Title -->
            <h1 class="main-title">
                <span class="title-text">Happy Birthday</span>
                <span class="name-highlight">Aarushi!</span>
            </h1>

            <!-- Subtitle -->
            <p class="subtitle">Wishing you a wonderful day filled with love! 💖</p>

            <!-- Countdown -->
            <div class="countdown-section">
                <h2 class="countdown-label">🎉 Birthday Countdown 🎉</h2>
                <div class="countdown">
                    <div class="countdown-item">
                        <span class="countdown-number" id="days">00</span>
                        <span class="countdown-text">Days</span>
                    </div>
                    <div class="countdown-separator">:</div>
                    <div class="countdown-item">
                        <span class="countdown-number" id="hours">00</span>
                        <span class="countdown-text">Hours</span>
                    </div>
                    <div class="countdown-separator">:</div>
                    <div class="countdown-item">
                        <span class="countdown-number" id="minutes">00</span>
                        <span class="countdown-text">Minutes</span>
                    </div>
                    <div class="countdown-separator">:</div>
                    <div class="countdown-item">
                        <span class="countdown-number" id="seconds">00</span>
                        <span class="countdown-text">Seconds</span>
                    </div>
                </div>
            </div>

            <!-- Wish Buttons -->
            <div class="button-section">
                <p class="button-label">🎁 Send Your Wishes 🎁</p>
                <div class="button-container">
                    <a href="tama.html" class="wish-button Tama">
                        <span class="button-icon">💕</span>
                        <span class="button-text">Tama's Wish</span>
                        <span class="button-subtext">View Wish →</span>
                    </a>
                    <a href="tuli.html" class="wish-button Tuli">
                        <span class="button-icon">💖</span>
                        <span class="button-text">Tuli's Wish</span>
                        <span class="button-subtext">View Wish →</span>
                    </a>
                </div>
            </div>

            <!-- Footer -->
            <footer class="footer">
                <p>Made with 💖 for Aarushi</p>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
