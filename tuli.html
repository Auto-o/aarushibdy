<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuli's Wish for Aarushi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="wish.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wish-page">
        <a href="index.html" class="back-btn">← Back to Birthday</a>
        
        <div class="raccoon">
            <svg viewBox="0 0 200 200" class="raccoon-svg">
                <ellipse cx="100" cy="120" rx="50" ry="40" fill="#8B7355"/>
                <ellipse cx="100" cy="130" rx="40" ry="30" fill="#A08060"/>
                <ellipse cx="70" cy="85" rx="30" ry="25" fill="#8B7355"/>
                <ellipse cx="130" cy="85" rx="30" ry="25" fill="#8B7355"/>
                <ellipse cx="70" cy="85" rx="20" ry="18" fill="#A08060"/>
                <ellipse cx="130" cy="85" rx="20" ry="18" fill="#A08060"/>
                <circle cx="85" cy="80" r="12" fill="white"/>
                <circle cx="115" cy="80" r="12" fill="white"/>
                <circle cx="85" cy="80" r="6" fill="#333"/>
                <circle cx="115" cy="80" r="6" fill="#333"/>
                <circle cx="87" cy="78" r="2" fill="white"/>
                <circle cx="117" cy="78" r="2" fill="white"/>
                <ellipse cx="100" cy="95" rx="8" ry="5" fill="#333"/>
                <path d="M 95 100 Q 100 105 105 100" stroke="#333" stroke-width="2" fill="none"/>
                <path d="M 60 70 Q 50 50 40 55" stroke="#8B7355" stroke-width="8" fill="none" stroke-linecap="round"/>
                <path d="M 140 70 Q 150 50 160 55" stroke="#8B7355" stroke-width="8" fill="none" stroke-linecap="round"/>
                <ellipse cx="35" cy="50" rx="12" ry="15" fill="#8B7355"/>
                <ellipse cx="165" cy="50" rx="12" ry="15" fill="#8B7355"/>
                <ellipse cx="35" cy="50" rx="6" ry="8" fill="#A08060"/>
                <ellipse cx="165" cy="50" rx="6" ry="8" fill="#A08060"/>
                <path d="M 30 140 Q 10 130 5 100" stroke="#8B7355" stroke-width="15" fill="none" stroke-linecap="round"/>
                <path d="M 170 140 Q 190 130 195 100" stroke="#8B7355" stroke-width="15" fill="none" stroke-linecap="round"/>
                <ellipse cx="10" cy="95" rx="12" ry="20" fill="#8B7355" stroke="#6B5344" stroke-width="2"/>
                <ellipse cx="190" cy="95" rx="12" ry="20" fill="#8B7355" stroke="#6B5344" stroke-width="2"/>
            </svg>
        </div>

        <h1 class="title">Tuli's Wish for Aarushi 💖</h1>

        <form class="wish-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST" enctype="multipart/form-data">
            <div class="form-section image-section">
                <label class="section-label">📷 Upload a Photo</label>
                <div class="image-upload">
                    <input type="file" id="photo" name="photo" accept="image/*" class="file-input">
                    <label for="photo" class="file-label">
                        <span class="upload-icon">📁</span>
                        <span class="upload-text">Click to upload a photo</span>
                        <span class="upload-hint">PNG, JPG, GIF</span>
                    </label>
                </div>
            </div>

            <div class="form-section message-section">
                <label class="section-label">💌 Write Your Wish</label>
                <textarea id="message" name="message" class="message-input" placeholder="Write your birthday wish for Aarushi here..." rows="6"></textarea>
            </div>

            <button type="submit" class="submit-btn">💝 Send Wish 💝</button>
        </form>

        <div id="preview" class="preview-section" style="display: none;">
            <h3>Your Wish Preview:</h3>
            <div class="preview-content">
                <img id="preview-image" src="" alt="Your photo" style="display: none;">
                <p id="preview-message"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Preview functionality
        document.getElementById('photo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview-image').src = e.target.result;
                    document.getElementById('preview-image').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('message').addEventListener('input', function(e) {
            document.getElementById('preview-message').textContent = e.target.value;
        });
    </script>
</body>
</html>
