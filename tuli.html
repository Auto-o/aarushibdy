<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuli's Wish for Aarushi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="wish.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <!-- Animated JS Background -->
    <canvas id="bg-canvas"></canvas>
    
    <div class="wish-display-page">
        <!-- Floating Decorations -->
        <div class="floating-decorations" id="floating-decorations"></div>
        
        <!-- Back Button -->
        <a href="index.html" class="back-button">
            <span class="back-icon">←</span>
            <span>Back to Birthday</span>
        </a>
        
        <div class="container">
            <!-- Title -->
            <h1 class="page-title">
                <span class="title-icon">💖</span>
                Tuli's Wish
                <span class="title-icon">💖</span>
            </h1>
            
            <!-- Wish Card -->
            <div class="wish-card">
                <!-- Photo Section - Replace src with your photo -->
                <div class="photo-section">
                    <div class="photo-frame">
                        <img id="tuli-photo" src="tuli.jpg" alt="Tuli's photo for Aarushi" onerror="this.style.display='none'; document.getElementById('no-photo-tuli').style.display='flex';">
                        <div id="no-photo-tuli" class="no-photo" style="display: none;">
                            <span class="no-photo-icon">📷</span>
                            <span>Add Photo Here</span>
                        </div>
                    </div>
                </div>
                
                <!-- Message Section -->
                <div class="message-section">
                    <div class="message-label">💌 Message for Aarushi</div>
                    <div class="message-text" id="tuli-message">
                        Hey Aarushi! 🎉<br><br>
                        Happy Birthday to the best friend ever! 💖<br><br>
                        May your day be as amazing as you are!<br><br>
                        Have a fantastic birthday! 🎂🎈<br><br>
                        Lots of love,<br>
                        Tuli 💖
                    </div>
                </div>
            </div>
            
            <!-- Decorative Hearts -->
            <div class="card-hearts">
                <span>💗</span><span>💘</span><span>❤️</span><span>💗</span><span>💘</span>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
